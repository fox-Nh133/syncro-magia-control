<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Magia Conductor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
      --bg-base:    #08080f;
      --bg-surface: #0d0d1a;
      --bg-card:    #13131f;
      --border:     #1e1e30;
      --accent:     #7c3aed;
      --accent-hi:  #a78bfa;
      --text:       #d0d0e8;
      --text-muted: #5a5a90;
    }

    html, body {
      background: var(--bg-base);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
    }
    header h1 {
      font-size: 1.15rem;
      font-weight: 800;
      background: linear-gradient(120deg, var(--accent-hi), #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0;
    }

    /* ── Cards ── */
    .mc-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }
    .mc-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    /* ── Status badges ── */
    .status-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .status-count {
      font-size: 3rem;
      font-weight: 800;
      line-height: 1;
      color: var(--accent-hi);
    }
    .badge-sync {
      font-size: 0.72rem;
      border-radius: 30px;
      padding: 3px 10px;
    }

    /* ── File inputs ── */
    .mc-file-label {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      transition: border-color 0.15s;
      font-size: 0.88rem;
    }
    .mc-file-label:hover { border-color: var(--accent); }
    .mc-file-label .file-name {
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 220px;
    }
    .mc-file-label.loaded .file-name { color: #4ade80; }
    .mc-file-label .bi { font-size: 1.1rem; color: var(--text-muted); flex-shrink: 0; }

    /* ── Orchestra Start ── */
    #start-btn {
      background: linear-gradient(135deg, #5b21b6, #7c3aed);
      border: none;
      border-radius: 16px;
      color: #fff;
      font-size: 1.3rem;
      font-weight: 700;
      padding: 22px;
      width: 100%;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 24px #7c3aed44;
      transition: filter 0.15s, transform 0.1s, box-shadow 0.15s;
    }
    #start-btn:hover:not(:disabled) {
      filter: brightness(1.15);
      box-shadow: 0 6px 32px #7c3aed88;
    }
    #start-btn:active:not(:disabled) { transform: scale(0.97); }
    #start-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* countdown overlay */
    #countdown-overlay {
      background: var(--bg-card);
      border: 2px solid var(--accent);
      border-radius: 16px;
      padding: 22px;
      text-align: center;
      display: none;
    }
    #countdown-num {
      font-size: 4rem;
      font-weight: 900;
      color: var(--accent-hi);
      line-height: 1;
    }

    /* ── Color buttons ── */
    .color-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s, box-shadow 0.15s;
      flex-shrink: 0;
    }
    .color-btn:hover { transform: scale(1.1); }
    .color-btn.selected {
      border-color: var(--accent-hi);
      box-shadow: 0 0 14px var(--accent-hi);
    }

    /* ── Effect toggle ── */
    .effect-btn {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 8px 18px;
      font-size: 0.88rem;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .effect-btn.active {
      background: #2d0b6e;
      border-color: var(--accent);
      color: var(--accent-hi);
    }

    /* ── Instant trigger button ── */
    #instant-btn {
      background: linear-gradient(135deg, #b45309, #d97706);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 18px;
      width: 100%;
      box-shadow: 0 4px 20px #d9770644;
      transition: filter 0.15s, transform 0.1s;
    }
    #instant-btn:hover:not(:disabled) { filter: brightness(1.15); }
    #instant-btn:active:not(:disabled) { transform: scale(0.97); }
    #instant-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Toast ── */
    #toast-container {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      pointer-events: none;
    }
    .mc-toast {
      background: #1a1a2e;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 0.85rem;
      color: var(--text);
      animation: toastIn 0.2s ease;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Bootstrap overrides for dark theme */
    .form-range::-webkit-slider-thumb { background: var(--accent); }
    .form-range::-moz-range-thumb { background: var(--accent); }
  </style>
</head>
<body>

<!-- ═══ Header ═══ -->
<header class="d-flex align-items-center justify-content-between">
  <h1><i class="bi bi-music-note-beamed"></i> Magia Conductor</h1>
  <span id="conn-badge" class="badge bg-danger">Disconnected</span>
</header>

<!-- ═══ Main content ═══ -->
<div class="container-fluid px-3 py-4" style="max-width:600px;">

  <!-- ── Status row ── -->
  <div class="row g-3 mb-3">
    <!-- Connected devices -->
    <div class="col-6">
      <div class="mc-card h-100 text-center">
        <div class="mc-label">Connected</div>
        <div class="d-flex align-items-center justify-content-center gap-2">
          <i class="bi bi-people" style="font-size:1.6rem;color:var(--text-muted);"></i>
          <span class="status-count" id="total-count">0</span>
        </div>
        <div class="mt-1" style="font-size:0.72rem;color:var(--text-muted);">devices</div>
      </div>
    </div>
    <!-- Sync status -->
    <div class="col-6">
      <div class="mc-card h-100 text-center">
        <div class="mc-label">Time Sync</div>
        <div class="d-flex flex-column align-items-center justify-content-center gap-2" style="height:60px;">
          <i class="bi bi-clock" id="sync-icon" style="font-size:1.6rem;color:var(--text-muted);"></i>
          <span class="badge badge-sync bg-secondary" id="sync-badge">Waiting...</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── File setup ── -->
  <div class="mc-card mb-3">
    <div class="mc-label">File Setup</div>

    <label class="mc-file-label mb-2" id="json-label">
      <i class="bi bi-file-earmark-code"></i>
      <span class="file-name" id="json-name">演出 JSON を選択...</span>
      <input type="file" id="json-input" accept=".json,application/json" class="d-none">
    </label>

    <div class="mc-file-label" id="audio-label" style="cursor:default;">
      <i class="bi bi-file-music"></i>
      <span class="file-name" id="audio-name">audio.mp3</span>
      <label class="ms-auto mb-0" title="音源を変更" style="cursor:pointer;color:var(--text-muted);font-size:1.1rem;">
        <i class="bi bi-folder2-open"></i>
        <input type="file" id="audio-input" accept="audio/*" class="d-none">
      </label>
    </div>

    <div class="d-flex gap-2 mt-3">
      <button class="btn btn-sm btn-outline-secondary flex-fill" id="upload-btn" disabled>
        <i class="bi bi-cloud-upload me-1"></i>演出をサーバーへ送信
      </button>
    </div>
  </div>

  <!-- ── Orchestra Start ── -->
  <div class="mc-card mb-3">
    <div class="mc-label">Performance Control</div>

    <div id="start-area">
      <button id="start-btn" disabled>
        <i class="bi bi-play-circle me-2"></i>Orchestra Start
      </button>
    </div>

    <div id="countdown-overlay">
      <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:4px;">Starting in</div>
      <div id="countdown-num">5</div>
      <div style="font-size:0.8rem;color:var(--text-muted);margin-top:4px;">seconds</div>
    </div>
  </div>

  <!-- ── Instant Demo ── -->
  <div class="mc-card">
    <div class="mc-label">Instant Demo</div>

    <!-- Color presets -->
    <div class="d-flex align-items-center gap-3 flex-wrap mb-3">
      <button class="color-btn selected" data-color="#ffffff" style="background:#ffffff;" title="White"></button>
      <button class="color-btn" data-color="#ef4444" style="background:#ef4444;" title="Red"></button>
      <button class="color-btn" data-color="#3b82f6" style="background:#3b82f6;" title="Blue"></button>
      <button class="color-btn" data-color="#f59e0b" style="background:#f59e0b;" title="Gold"></button>
      <button class="color-btn" data-color="#22c55e" style="background:#22c55e;" title="Green"></button>
      <button class="color-btn" data-color="#ec4899" style="background:#ec4899;" title="Pink"></button>
      <!-- Custom color picker -->
      <label class="color-btn d-flex align-items-center justify-content-center" style="background:var(--bg-surface);border-color:var(--border);border-radius:10px;width:52px;height:52px;" title="Custom">
        <i class="bi bi-palette" style="font-size:1.2rem;color:var(--text-muted);pointer-events:none;"></i>
        <input type="color" id="custom-color" value="#7c3aed" class="d-none">
      </label>
    </div>

    <!-- Selected color preview -->
    <div class="d-flex align-items-center gap-2 mb-3">
      <div id="color-preview" style="width:28px;height:28px;border-radius:50%;background:#ffffff;border:2px solid var(--border);flex-shrink:0;"></div>
      <span id="color-hex" style="font-size:0.88rem;font-family:monospace;color:var(--text-muted);">#ffffff</span>
    </div>

    <!-- Effect selector -->
    <div class="mc-label">Effect</div>
    <div class="d-flex gap-2 mb-3 flex-wrap">
      <button class="effect-btn active" data-effect="static">
        <i class="bi bi-circle-fill me-1" style="font-size:0.6rem;"></i>Static
      </button>
      <button class="effect-btn" data-effect="flash">
        <i class="bi bi-stars me-1" style="font-size:0.6rem;"></i>Flash
      </button>
      <button class="effect-btn" data-effect="wave">
        <i class="bi bi-water me-1" style="font-size:0.6rem;"></i>Wave
      </button>
      <button class="effect-btn" data-effect="split">
        <i class="bi bi-arrows-expand me-1" style="font-size:0.6rem;"></i>Split
      </button>
    </div>

    <!-- Fire button -->
    <button id="instant-btn">
      <i class="bi bi-lightning-charge-fill me-2"></i>Send Instant Trigger
    </button>
  </div>

</div>

<!-- ═══ Toast container ═══ -->
<div id="toast-container"></div>

<!-- Hidden audio element -->
<audio id="audio-player" preload="auto"></audio>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
// ════════════════════════════════════════════════════════════
// Config
// ════════════════════════════════════════════════════════════
const SERVER_URL   = 'https://syncro-magia-backend-production.up.railway.app';
const SYNC_ROUNDS  = 8;
const START_DELAY  = 5000; // ms

// ════════════════════════════════════════════════════════════
// State
// ════════════════════════════════════════════════════════════
let socket         = null;
let offset         = null;   // ms: client clock - server clock  (add to Date.now() to get server time)
let performanceData = null;
let audioObjectURL  = null;
let startTimer      = null;

// ════════════════════════════════════════════════════════════
// DOM refs
// ════════════════════════════════════════════════════════════
const connBadge       = document.getElementById('conn-badge');
const totalCount      = document.getElementById('total-count');
const syncBadge       = document.getElementById('sync-badge');
const syncIcon        = document.getElementById('sync-icon');
const jsonInput       = document.getElementById('json-input');
const jsonLabel       = document.getElementById('json-label');
const jsonNameEl      = document.getElementById('json-name');
const audioInput      = document.getElementById('audio-input');
const audioLabel      = document.getElementById('audio-label');
const audioNameEl     = document.getElementById('audio-name');
const uploadBtn       = document.getElementById('upload-btn');
const startBtn        = document.getElementById('start-btn');
const startArea       = document.getElementById('start-area');
const countdownOverlay = document.getElementById('countdown-overlay');
const countdownNum    = document.getElementById('countdown-num');
const colorButtons    = document.querySelectorAll('.color-btn[data-color]');
const customColorInput = document.getElementById('custom-color');
const colorPreview    = document.getElementById('color-preview');
const colorHex        = document.getElementById('color-hex');
const effectButtons   = document.querySelectorAll('.effect-btn');
const instantBtn      = document.getElementById('instant-btn');
const audioPlayer     = document.getElementById('audio-player');

// ════════════════════════════════════════════════════════════
// Toast helper
// ════════════════════════════════════════════════════════════
function toast(msg, duration = 2500) {
  const el = document.createElement('div');
  el.className = 'mc-toast';
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), duration);
}

// ════════════════════════════════════════════════════════════
// Socket.IO
// ════════════════════════════════════════════════════════════
function connect() {
  socket = io(SERVER_URL, { transports: ['websocket', 'polling'] });

  socket.on('connect', () => {
    connBadge.textContent = 'Connected';
    connBadge.className = 'badge bg-success';
    startTimeSync();
  });

  socket.on('disconnect', () => {
    connBadge.textContent = 'Disconnected';
    connBadge.className = 'badge bg-danger';
    offset = null;
    setSyncBadge(false);
  });

  socket.on('total_update', ({ total }) => {
    totalCount.textContent = total;
  });

  socket.on('sync_time', handleSyncTime);

  socket.on('performance_start', ({ startTime }) => {
    scheduleLocalStart(startTime);
  });
}

// ════════════════════════════════════════════════════════════
// Time synchronisation  (NTP-style)
// ════════════════════════════════════════════════════════════
let syncSamples = [];
let syncPending = 0;
let lastT0      = 0;

function startTimeSync() {
  syncSamples = [];
  syncPending = 0;
  setSyncBadge(false);
  sendNextSync();
}

function sendNextSync() {
  if (syncPending >= SYNC_ROUNDS) return;
  syncPending++;
  lastT0 = Date.now();
  socket.emit('get_time');
}

function handleSyncTime({ serverTime }) {
  const t1  = Date.now();
  const rtt = t1 - lastT0;
  const sample = serverTime + rtt / 2 - t1;  // offset: add to Date.now() to get server time
  syncSamples.push(sample);

  if (syncSamples.length < SYNC_ROUNDS) {
    setTimeout(sendNextSync, 150);
  } else {
    // Discard top/bottom outliers, average the rest
    const sorted = [...syncSamples].sort((a, b) => a - b);
    const trimmed = sorted.slice(1, -1);
    offset = trimmed.reduce((s, v) => s + v, 0) / trimmed.length;
    setSyncBadge(true);
    updateStartBtn();
    toast(`Time sync OK  (offset ${offset.toFixed(1)} ms)`);
  }
}

function serverNow() {
  return Date.now() + (offset ?? 0);
}

function setSyncBadge(ok) {
  if (ok) {
    syncBadge.textContent = 'Synced';
    syncBadge.className = 'badge badge-sync bg-success';
    syncIcon.style.color = '#4ade80';
  } else {
    syncBadge.textContent = 'Waiting...';
    syncBadge.className = 'badge badge-sync bg-secondary';
    syncIcon.style.color = 'var(--text-muted)';
  }
}

// ════════════════════════════════════════════════════════════
// File setup
// ════════════════════════════════════════════════════════════
jsonInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      performanceData = JSON.parse(ev.target.result);
      jsonNameEl.textContent = file.name;
      jsonLabel.classList.add('loaded');
      updateStartBtn();
      updateUploadBtn();
      toast('JSON loaded: ' + file.name);
    } catch {
      toast('JSON parse error');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

audioInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  if (audioObjectURL) URL.revokeObjectURL(audioObjectURL);
  audioObjectURL = URL.createObjectURL(file);
  audioPlayer.src = audioObjectURL;
  audioNameEl.textContent = file.name;
  audioLabel.classList.add('loaded');
  updateStartBtn();
  toast('Audio loaded: ' + file.name);
  e.target.value = '';
});

function updateUploadBtn() {
  uploadBtn.disabled = !performanceData || !socket?.connected;
}

uploadBtn.addEventListener('click', () => {
  if (!performanceData || !socket?.connected) return;
  socket.emit('upload_performance', performanceData);
  toast('Performance data uploaded to server');
});

// ════════════════════════════════════════════════════════════
// Orchestra Start
// ════════════════════════════════════════════════════════════
function updateStartBtn() {
  const ready = socket?.connected && offset !== null && performanceData && audioObjectURL;
  startBtn.disabled = !ready;
}

startBtn.addEventListener('click', () => {
  if (startBtn.disabled) return;

  const startTime = serverNow() + START_DELAY;
  socket.emit('start_trigger', { startTime });
  scheduleLocalStart(startTime);
  toast('Orchestra Start triggered');
});

function scheduleLocalStart(startTime) {
  // Show countdown
  startArea.style.display = 'none';
  countdownOverlay.style.display = 'block';

  // Cancel any existing timer
  if (startTimer) clearInterval(startTimer);

  startTimer = setInterval(() => {
    const remaining = startTime - serverNow();
    if (remaining <= 0) {
      clearInterval(startTimer);
      startTimer = null;
      countdownNum.textContent = '0';
      // Hide countdown after 1 s
      setTimeout(() => {
        countdownOverlay.style.display = 'none';
        startArea.style.display = 'block';
      }, 1000);
    } else {
      countdownNum.textContent = Math.ceil(remaining / 1000);
    }
  }, 100);

  // Schedule audio playback
  waitAndPlay(startTime);
}

function waitAndPlay(startTime) {
  if (!audioObjectURL) return;

  function check() {
    const elapsed = serverNow() - startTime;
    if (elapsed >= 0) {
      audioPlayer.currentTime = Math.max(0, elapsed / 1000);
      audioPlayer.play().catch(err => toast('Audio play error: ' + err.message));
    } else {
      requestAnimationFrame(check);
    }
  }
  requestAnimationFrame(check);
}

// ════════════════════════════════════════════════════════════
// Instant Demo
// ════════════════════════════════════════════════════════════
let selectedColor  = '#ffffff';
let selectedEffect = 'static';

function setSelectedColor(hex) {
  selectedColor = hex;
  colorPreview.style.background = hex;
  colorHex.textContent = hex;
}

colorButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    colorButtons.forEach(b => b.classList.remove('selected'));
    document.querySelector('label[title="Custom"]').style.borderColor = 'var(--border)';
    btn.classList.add('selected');
    setSelectedColor(btn.dataset.color);
  });
});

// Custom color picker
customColorInput.addEventListener('input', () => {
  colorButtons.forEach(b => b.classList.remove('selected'));
  setSelectedColor(customColorInput.value);
});
customColorInput.addEventListener('change', () => {
  colorButtons.forEach(b => b.classList.remove('selected'));
  setSelectedColor(customColorInput.value);
});

effectButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    effectButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedEffect = btn.dataset.effect;
  });
});

instantBtn.addEventListener('click', () => {
  if (!socket?.connected) { toast('Not connected'); return; }
  socket.emit('instant_trigger', {
    color:    selectedColor,
    effect:   selectedEffect,
    range:    'all',
    duration: 2,
  });
  toast(`Instant trigger sent  ${selectedColor}  ${selectedEffect}`);
  // Brief visual feedback
  instantBtn.style.filter = 'brightness(1.4)';
  setTimeout(() => { instantBtn.style.filter = ''; }, 200);
});

// ════════════════════════════════════════════════════════════
// Boot
// ════════════════════════════════════════════════════════════

// Load default audio
audioPlayer.src = 'audio.mp3';
audioObjectURL = 'audio.mp3';
audioNameEl.textContent = 'audio.mp3';
audioLabel.classList.add('loaded');

connect();

socket.on('connect', () => {
  updateUploadBtn();
  updateStartBtn();
});

// Wire file label clicks to inputs
document.getElementById('json-label').addEventListener('click', () => jsonInput.click());
</script>
</body>
</html>
